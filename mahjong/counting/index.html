            <div class="vert" style="gap: 5px;">
                    <p class="name">西</p>
                    <p class="point">100</p>
            </div>
            <div class="hori">
                <div class="vert" style="gap: 5px;">
                    <p class="name">南</p>
                    <p class="point">100</p>
                </div>
                <div id="mahjongTable">東</div>

                    <p class="point">100</p>
                </div>

                    <p class="point">100</p>
            </div>
            <div id="inputs" class="vert">
                <div class="hori">
                    <p>東</p>
                    <input type="text" placeholder="入名">
                </div>
                <div class="hori">
                    <p>南</p>
                    <input type="text" placeholder="入名">
                </div>
                <div class="hori">
                    <p>西</p>
                    <input type="text" placeholder="入名">
                </div>

                    <p>北</p>
                    <input type="text" placeholder="入名">
                </div>
                <div class="hori">
                    <button id="nameBtn" class="pri navbar">搞掂</button>
                    <button id="changeWindBtn" class="sec navbar">轉風位</button>
                </div>
            </div>

            <div id="btns" class="vert">
                <button id="eatBtn" class="pri">食糊</button>
                <button class="sec">結算</button>
            </div>

                <div class="hori">
                    <button id="givenBtn" class="sec navbar selBtns">出銃</button>
                    <button id="gottenBtn" class="pri navbar selBtns">自摸</button>
                </div>
            </div>
