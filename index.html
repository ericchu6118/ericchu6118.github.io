        <img src="" alt="image" />
        <!-- The core Firebase JS SDK is always required and must be listed first -->

        <script>
            var storage = firebase.database()
            function UrlSearch() {
                var name, value;
                var str = location.href; //取得整個地址欄
                var num = str.indexOf("?")
                str = str.substr(num + 1); //取得所有參數 
                var arr = str.split("&"); //各個參數放到數組
                var back = []
                for (var i = 0; i < arr.length; i++) {
                    num = arr[i].indexOf("=");
                    if (num > 0) {
                        name = arr[i].substring(0, num);
                        value = arr[i].substr(num + 1);
                        back[name] = value;
                    }
                }
                return back
            };

            if(UrlSearch()["method"] == "cover"){
                storageRef = storage.ref('');
                storageRef.child(firebase.database().ref("書本").ref(UrlSearch()["name"]).ref("cover")).getDownloadURL().then(function(url) {
                // `url` is the download URL for 'images/stars.jpg'

                // This can be downloaded directly:
                var xhr = new XMLHttpRequest();
                xhr.responseType = 'blob';
                xhr.onload = function(event) {
                    var blob = xhr.response;
                };
                xhr.open('GET', url);
                xhr.send();

                // Or inserted into an <img> element:
                var img = document.getElementById('cover');
                img.src = url;
            }).catch(function(error) {
                // Handle any errors
            });
        };
        </script>
    </body>
