<!DOCTYPE html>
<html lang="zh-hk" xmlns="https://www.w3.org/1999/xhtml>">
    <head>
        <title>Sharebook Server</title>
    </head>
    <body>
        <script>
            function UrlSearch() {
                var name, value;
                var str = location.href; //取得整個地址欄
                var num = str.indexOf("?")
                str = str.substr(num + 1); //取得所有參數 
                var arr = str.split("&"); //各個參數放到數組
                var back = []
                for (var i = 0; i < arr.length; i++) {
                    num = arr[i].indexOf("=");
                    if (num > 0) {
                        name = arr[i].substring(0, num);
                        value = arr[i].substr(num + 1);
                        back[name] = value;
                    }
                }
                return back
            };
        </script>
    </body>
</html>
